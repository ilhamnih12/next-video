name: Build Android APK
on:
  push:
    branches: [ main ] # Jalankan setiap kali kamu push ke branch main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Install Capacitor & Android dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create Capacitor config if missing
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            npx cap init "MyApp" "com.example.app" --web-dir=out
          fi

      - name: Build Next.js
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Add Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Generate Assets & Sync
        run: |
          npx @capacitor/assets generate
          npx @capacitor/cli sync

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
